[tox]
isolated_build = true
envlist =
    py312-django{40,42,50,51,52,60}
    py313-django{40,42,50,51,52,60}
    py314-django{40,42,50,51,52,60}
    quality
    security
    build
    docs

[testenv]
description = Run tests with pytest
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest
    pytest-django
    pytest-cov
    factory_boy
    coverage[toml]
    django40: Django>=4.0,<4.1
    django42: Django>=4.2,<5.0
    django50: Django>=5.0,<5.1
    django51: Django>=5.1,<5.2
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<7.0
commands =
    pytest tests/ --cov=graphene_django_extras --cov-report=term-missing

[testenv:quality]
description = Code quality checks (black, isort, flake8, mypy)
skip_install = true
deps =
    black>=23.0.0
    isort>=5.0.0
    flake8>=6.0.0
    flake8-docstrings
    flake8-import-order
    flake8-bugbear
    mypy
    types-six
    types-python-dateutil
commands =
    black --check --diff .
    isort --check-only --diff .
    flake8 .
    mypy graphene_django_extras

[testenv:security]
description = Security checks (bandit, safety)
skip_install = true
deps =
    bandit>=1.7.5
    pip-audit
commands =
    bandit -r graphene_django_extras/ -c pyproject.toml
    pip-audit

[testenv:build]
description = Build the package with poetry
skip_install = true
allowlist_externals = poetry
commands =
    poetry build

[testenv:docs]
description = Build the documentation with MkDocs
skip_install = true
deps =
    mkdocs>=1.5.0
    mkdocs-material>=9.4.0
    pymdown-extensions>=10.4.0
commands =
    mkdocs build --clean

[gh-actions]
python =
    3.12: py312-django40, py312-django42, py312-django50, py312-django51, py312-django52, py312-django60
    3.13: py313-django40, py313-django42, py313-django50, py313-django51, py313-django52, py313-django60
    3.14: py314-django40, py314-django42, py314-django50, py314-django51, py314-django52, py314-django60

[flake8]
max-line-length = 88
select = E,W,F,C,N,D
ignore = E203,E501,W503
exclude = .git,__pycache__,.tox,.eggs,*.egg,build,dist,.venv,venv,migrations
per-file-ignores =
    __init__.py:F401
    tests/*:D
