name: Test

on:
  pull_request:
    branches: ["develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  

jobs:
  test:
    if: github.event_name != 'workflow_dispatch' || github.ref_name != 'develop'
    runs-on: runs-on=${{ github.run_id }}/runner=ubuntu

    steps:
      - name: Validate PR Title
        uses: quarticai/actions-pull-request@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          jira-project-key: 'QPD'